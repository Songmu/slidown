version: 2
before:
  hooks:
    - go mod download
    - go mod tidy
builds:
  -
    id: slidown-darwin
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/Songmu/slidown.Revision={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/slidown/main.go
  -
    id: slidown-windows
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/Songmu/slidown.Revision={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
    main: ./cmd/slidown/main.go
  -
    id: slidown-linux
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/Songmu/slidown.Revision={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    main: ./cmd/slidown/main.go
archives:
  -
    id: slidown-archive
    name_template: '{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}'
    format_overrides:
      - goos: darwin
        formats:
          - zip
    files:
      - LICENSE
      - CREDITS
      - README.md
      - CHANGELOG.md
checksum:
  name_template: 'checksums.txt'
changelog:
  sort: asc
  filters:
    exclude:
    - '^docs:'
    - '^test:'
nfpms:
  -
    id: slidown-nfpms
    file_name_template: "{{ .ProjectName }}_{{ .Version }}-1_{{ .Arch }}"
    builds:
      - slidown-linux
    homepage: https://github.com/Songmu/slidown
    maintainer: Songmu <y.songmu@gmail.com>
    description: slidown is a tool for creating PowerPoint presentations from Markdown.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    epoch: 1
release:
  use_existing_draft: true
