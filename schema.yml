# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema

"$schema": https://json-schema.org/draft/2020-12/schema
title: slidown Configuration Schema
description: Configuration schema for slidown - a tool for creating PowerPoint (.pptx) presentations from Markdown
type: object
additionalProperties: false
properties:
  breaks:
    type: boolean
    description: "Whether to display line breaks in the presentation as line breaks"
  codeBlockToImageCommand:
    type: string
    description: "Command to convert code blocks to images"
    examples:
    - "laminate"
    - "silicon -l {{lang}} -o {{output}}"
  template:
    type: string
    description: "Path to a .pptx file whose theme, slide masters and layouts are used as the design"
  defaults:
    type: array
    description: "Default page configurations based on CEL expressions"
    items:
      type: object
      additionalProperties: false
      properties:
        if:
          type: string
          description: "CEL expression condition for applying this default configuration"
          examples:
            - "page == 1"
            - "titles.size() == 1 && headings[2].size() == 1"
            - "speakerNote.contains('TODO')"
            - "true"
        layout:
          type: string
          description: "Slide layout to apply when the condition is met"
          examples:
            - "title"
            - "title-and-body"
            - "part"
            - "section"
            - "chapter"
        freeze:
          type: boolean
          description: "Whether to freeze the page: when rebuilding over an existing .pptx, a frozen page keeps its existing slide as-is even if the markdown changed"
        ignore:
          type: boolean
          description: "Whether to ignore (exclude from processing) the page when the condition is met"
        skip:
          type: boolean
          description: "Whether to skip (mark as skipped) the page when the condition is met"
      required:
        - if
      oneOf:
        - required: ["layout"]
        - required: ["freeze"]
        - required: ["ignore"]
        - required: ["skip"]
