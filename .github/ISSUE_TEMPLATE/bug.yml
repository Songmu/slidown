name: Bug Report
description: A Bug report with error.json
title: "(Please update title)"
labels: ["bug"]
assignees:
  - Songmu
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: input
    id: verson
    attributes:
      label: Version
      description: Please paste the result of running `slidown -v`.
      placeholder: 0.0.0
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: textarea
    id: error-json
    attributes:
      label: error.json
      description: If an error occurred during slidown execution, please paste the contents of `$XDG_STATE_HOME/slidown/error.json` or `$HOME/.local/state/slidown/error.json`.
      placeholder: Paste the error.json content here
      render: json
    validations:
      required: false
